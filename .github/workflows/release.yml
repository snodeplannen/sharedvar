name: Release Pipeline

on:
  push:
    tags:
      - 'v*' # Trigger strictly on tags like v1.0.0

jobs:
  build_release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVC & MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build ATL COM Solutions
        run: |
          msbuild ATLProjectcomserver.sln /p:Configuration=Release /p:Platform=x64
          
      - name: Generate Flatbuffers Schema V3
        run: |
          cd SharedValueV3_MemMap
          .\build_schema.ps1

      - name: Build SharedValueV3 (C++)
        run: |
          cd SharedValueV3_MemMap\cpp_core
          cmake -B build
          cmake --build build --config Release

      - name: Build SharedValueV3 (C#)
        run: |
          cd SharedValueV3_MemMap\csharp_core
          dotnet build -c Release

      - name: Generate Flatbuffers Schema V4
        run: |
          cd SharedValueV4
          .\build_schema.ps1

      - name: Build SharedValueV4 (C++)
        run: |
          cd SharedValueV4\cpp_core
          cmake -B build
          cmake --build build --config Release

      - name: Build SharedValueV4 (C#)
        run: |
          cd SharedValueV4\csharp_core
          dotnet build -c Release

      - name: Build V2 WiX Installer
        run: |
          cd SharedValueInstaller
          dotnet build -c Release

      - name: Build V5 SDK & WiX Installer
        run: |
          cd SharedValueV5Installer
          .\build_sdk_installer.ps1

      - name: Package Developer Bundle
        run: |
          # Create staging directory
          mkdir developer_bundle
          mkdir developer_bundle\ATLProjectcomserverExe
          mkdir developer_bundle\ATLProjectcomserverLegacy
          mkdir developer_bundle\SharedValueV2_Headers
          mkdir developer_bundle\SharedValueV3_MemMap_Native
          mkdir developer_bundle\SharedValueV3_MemMap_CSharp
          mkdir developer_bundle\SharedValueV4_Native
          mkdir developer_bundle\SharedValueV4_CSharp
          mkdir developer_bundle\SharedValueV5_SDK
          
          # Copy ATL components (EXE + PDB + TLB + Source generated Headers)
          xcopy /Y x64\Release\*.exe developer_bundle\ATLProjectcomserverExe\
          xcopy /Y x64\Release\ATLProjectcomserver.pdb developer_bundle\ATLProjectcomserverExe\
          xcopy /Y ATLProjectcomserverExe\x64\Release\*.tlb developer_bundle\ATLProjectcomserverExe\
          xcopy /Y ATLProjectcomserverExe\*_i.h developer_bundle\ATLProjectcomserverExe\
          xcopy /Y ATLProjectcomserverExe\*_i.c developer_bundle\ATLProjectcomserverExe\
          
          # Copy Legacy DLL components
          xcopy /Y x64\Release\*.dll developer_bundle\ATLProjectcomserverLegacy\
          xcopy /Y x64\Release\ATLProjectcomserver.pdb developer_bundle\ATLProjectcomserverLegacy\
          xcopy /Y ATLProjectcomserverLegacy\x64\Release\*.tlb developer_bundle\ATLProjectcomserverLegacy\
          xcopy /Y ATLProjectcomserverLegacy\*_i.h developer_bundle\ATLProjectcomserverLegacy\
          xcopy /Y ATLProjectcomserverLegacy\*_i.c developer_bundle\ATLProjectcomserverLegacy\
          
          # Copy SharedValueV2 Headers
          xcopy /Y /S SharedValueV2\include\* developer_bundle\SharedValueV2_Headers\
          
          # Copy SharedValueV3 artifacts
          xcopy /Y SharedValueV3_MemMap\cpp_core\build\Release\*.exe developer_bundle\SharedValueV3_MemMap_Native\
          xcopy /Y SharedValueV3_MemMap\cpp_core\build\Release\*.pdb developer_bundle\SharedValueV3_MemMap_Native\
          xcopy /Y /S SharedValueV3_MemMap\csharp_core\bin\Release\net8.0\* developer_bundle\SharedValueV3_MemMap_CSharp\

          # Copy SharedValueV4 artifacts
          xcopy /Y SharedValueV4\cpp_core\build\Release\*.exe developer_bundle\SharedValueV4_Native\
          xcopy /Y SharedValueV4\cpp_core\build\Release\*.pdb developer_bundle\SharedValueV4_Native\
          xcopy /Y /S SharedValueV4\csharp_core\bin\Release\net8.0\* developer_bundle\SharedValueV4_CSharp\
          
          # Copy SharedValueV5 staging SDK artifacts
          xcopy /Y /S SharedValueV5Installer\staging\* developer_bundle\SharedValueV5_SDK\
          
          # Inject full Source Code & Documentation into the bundle
          mkdir developer_bundle\SourceCode_And_Docs
          git archive HEAD -o temp_src.zip
          Expand-Archive temp_src.zip -DestinationPath developer_bundle\SourceCode_And_Docs
          Remove-Item temp_src.zip
          
          # Zip boundaries
          Compress-Archive -Path developer_bundle\* -DestinationPath Developer_Bundle.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            Developer_Bundle.zip
            SharedValueInstaller\bin\x64\Release\*.msi
            SharedValueV5Installer\bin\x64\Release\*.msi

  build_wheels:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Python Wheels (3.10-3.13 Windows)
        uses: pypa/cibuildwheel@v2
        with:
          package-dir: SharedValueV5/python_ext
        env:
          CIBW_BUILD: "cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64"

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: wheelhouse/*.whl

  publish_release:
    needs: [build_release, build_wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Release Binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts

      - name: Download Python Wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: wheels

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Developer_Bundle.zip
            artifacts/**/*.msi
            wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
